---
openapi: 3.0.1
info:
  title: Accounts API V1
  version: v1
  description: REST API documentation for the Identity platform. All authenticated
    API endpoints require a valid JWT token.
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: accounts.satu-raya.dev
      description: The brand's accounts host (e.g. accounts.brand.com)
- url: /
- url: http://localhost:3000
paths:
  "/api/v1/auth/login":
    post:
      summary: Authenticates a user and returns a JWT token
      tags:
      - Authentication
      parameters:
      - name: X-Tenant-Slug
        in: header
        required: true
        description: Tenant unique identifier
        schema:
          type: string
      responses:
        '200':
          description: Authenticated successfully
        '401':
          description: Invalid credentials
        '404':
          description: Tenant not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: Password123!
              required:
              - email
              - password
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
