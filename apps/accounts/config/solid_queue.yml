production:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - name: default_worker
      queues: default
      threads: 5
      polling_interval: 0.1
    - name: webhooks_worker
      queues: webhooks
      threads: 5
      polling_interval: 0.1

development:
  dispatchers:
    - polling_interval: 1
      batch_size: 100
  workers:
    - name: default_worker
      queues: default
      threads: 3
      polling_interval: 0.5
    - name: webhooks_worker
      queues: webhooks
      threads: 3
      polling_interval: 0.5

test:
  dispatchers:
    - polling_interval: 1
      batch_size: 100
  workers:
    - name: test_worker
      queues: "*"
      threads: 3
      polling_interval: 0.1
