services:
  accounts-app:
    container_name: satu-raya-accounts-dev
    image: satu-raya-accounts:dev-v1.0
    build:
      context: ../../
      dockerfile: apps/accounts/Dockerfile
      target: development
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/satu_raya_accounts_development
      RAILS_ENV: development
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-development_secret_key_not_used_in_production}
      REDIS_URL: redis://redis:6379/0
      APP_HOST: accounts.satu-raya.dev
      APP_PORT: 3000
      APP_PROTOCOL: https
      SMTP_ADDRESS: mailpit
      SMTP_PORT: 1025
      SMTP_DOMAIN: satu-raya.dev
      SMTP_USER_NAME: ""
      SMTP_PASSWORD: ""
      SMTP_AUTHENTICATION: ""
      SMTP_ENABLE_STARTTLS_AUTO: "false"
    volumes:
      - ../../apps/accounts:/rails
      - bundle_cache:/usr/local/bundle
      - shared_storage:/rails/storage
      - ../../packages/commons:/packages/commons
      - ../../packages/system:/packages/system
      - ../../packages/identity:/packages/identity
      - ../../packages/identity-client:/packages/identity-client
      - ../../packages/identity-ui:/packages/identity-ui
      - ../../packages/ui:/packages/ui
      - ../../packages/navigation:/packages/navigation
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: satu-raya-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
