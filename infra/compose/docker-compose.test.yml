services:
  accounts-app-test:
    build:
      context: ../../
      dockerfile: infra/compose/Dockerfile.accounts-test
    image: satu-raya-accounts:test-v1.0
    container_name: satu-raya-accounts-test
    extra_hosts:
      - "company.satu-raya.test:127.0.0.1"
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:password@db-test:5432/satu_raya_test
      REDIS_URL: redis://redis-test:6379/0
      SECRET_KEY_BASE: test_secret_key_not_used_in_production
    volumes:
      - ../../apps/accounts:/rails
      - bundle_cache_test:/usr/local/bundle
      - ../../packages/commons:/packages/commons
      - ../../packages/system:/packages/system
      - ../../packages/identity:/packages/identity
      - ../../packages/identity-client:/packages/identity-client
      - ../../packages/identity-ui:/packages/identity-ui
      - ../../packages/ui:/packages/ui
      - ../../packages/navigation:/packages/navigation

  db-test:
    image: postgres:16-alpine
    container_name: satu-raya-db-test
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: satu_raya_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: satu-raya-redis-test
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bundle_cache_test:
