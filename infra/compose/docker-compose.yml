name: satu-raya-accounts

services:
  accounts-app:
    build:
      context: ../../
      dockerfile: apps/accounts/Dockerfile
    image: satu-raya-accounts:prod-v1.0
    container_name: satu-raya-accounts-prod
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/accounts_production
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-f5e6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3002:3000"
    volumes:
      - ../../apps/accounts:/rails
      - bundle_cache:/usr/local/bundle
      - shared_storage:/rails/storage
      - ../../packages/commons:/packages/commons
      - ../../packages/system:/packages/system
      - ../../packages/identity:/packages/identity
      - ../../packages/identity-client:/packages/identity-client
      - ../../packages/identity-ui:/packages/identity-ui
      - ../../packages/ui:/packages/ui
      - ../../packages/navigation:/packages/navigation

  accounts-worker:
    build:
      context: ../../
      dockerfile: apps/accounts/Dockerfile
    image: satu-raya-accounts:prod-v1.0
    container_name: satu-raya-accounts-worker-prod
    command: bundle exec rake solid_queue:start
    depends_on:
      - accounts-app
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/accounts_production
      RAILS_ENV: production
      BUNDLE_WITHOUT: ""
    volumes:
      - ../../apps/accounts:/rails
      - bundle_cache:/usr/local/bundle

  db:
    image: postgres:16-alpine
    container_name: satu-raya-db
    environment:
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: satu-raya-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: satu-raya-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - accounts-app

volumes:
  postgres_data:
  bundle_cache:
  shared_storage:
  caddy_data:
  caddy_config:
